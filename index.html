<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Registro Viaggi</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container my-4">

    <h1 class="mb-4">Inserisci Nuovo Viaggio</h1>
    
    <div class="card p-4 mb-4 shadow-sm">
        <div class="mb-2">
            <input id="city" type="text" placeholder="Città" class="form-control">
        </div>
        <div class="mb-2">
            <input id="date" type="date" class="form-control">
        </div>
        <div class="form-check mb-2">
            <input id="checkbox" type="checkbox" class="form-check-input">
            <label class="form-check-label" for="checkbox">Utilizzo dell'aereo (Andata)</label>
        </div>
        <div class="mb-3">
            <input id="price" type="number" placeholder="Soldi spesi (€)" class="form-control">
        </div>
        <button id="butt" class="btn btn-primary">AGGIUNGI VIAGGIO</button>
    </div>

    <div class="mb-4">
        <button id="butt1" class="btn bg-info text-white me-2">TOTALE SPESO</button>
        <button id="butt2" class="btn bg-info text-white me-2">NUMERO VOLI</button>
        <button id="buttSave" class="btn btn-success">SALVA DATI (LOCAL STORAGE)</button>
    </div>

    <hr>

    <div class="card p-4 mb-4 border-danger">
        <h5 class="text-danger mb-3">Zona Rimozione</h5>
        <div class="mb-3">
            <button id="butt3" class="btn btn-danger">ELIMINA TUTTI I VIAGGI</button>
        </div>
        <p class="mb-1">Elimina un singolo viaggio inserendo il nome della città:</p>
        <div class="input-group">
            <input id="city1" type="text" placeholder="Città da eliminare" class="form-control">
            <button id="butt4" class="btn btn-warning">ELIMINA VIAGGIO</button>
        </div>
    </div>

    <!-- Tabella interattiva dinamica -->
    <div id="container2" class="mt-4"></div>

    <div class="mt-4 mb-5">
        <!-- Collegamento invertito che punta alla pagina di riepilogo statico -->
        <a href="p1.html" class="btn btn-secondary">Vai alla Pagina Storico (Sola Lettura)</a>
    </div>

    <!-- MODAL 1: TOTALE SPESO -->
    <div class="modal fade" id="mymodal" tabindex="-1"> 
        <div class="modal-dialog"> 
            <div class="modal-content"> 
                <div class="modal-header"> 
                    <h5 class="modal-title">Spesa Totale</h5> 
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button> 
                </div> 
                <div class="modal-body"> 
                    <p id="p1"></p>
                </div> 
            </div> 
        </div> 
    </div>

    <!-- MODAL 2: NUMERO VOLI -->
    <div class="modal fade" id="mymodal1" tabindex="-1"> 
        <div class="modal-dialog"> 
            <div class="modal-content"> 
                <div class="modal-header"> 
                    <h5 class="modal-title">Statistiche Voli</h5> 
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button> 
                </div> 
                <div class="modal-body"> 
                    <h5>Numero Voli effettuati:</h5>
                    <p id="p2"></p>
                    <hr>
                    <h5>Città visitate in aereo:</h5>
                    <p id="p3"></p>
                </div> 
            </div> 
        </div> 
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
