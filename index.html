<html lang="en">
<head>

<body>

    <button id="butt1">TOTALE SPESO</button>
    <button id="butt2">NUMERO VOLI</button>

    <div class="modal fade" id="mymodal" tabindex="-1">

            <div class="modal-content"> 
                <div class="modal-header"> 
                    <h1 class="modal-title fs-5">TOTALE SPESO IN TUTTI I VIAGGI</h1> 
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button> 
                </div> 
                <div class="modal-body"> 
                    <p id="p1"></p>
                </div> 
            </div>

    </div>

        <h5>CITTA' VISITATE</h5>
